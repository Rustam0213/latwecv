<script>
/* ===== Mobile nav toggle ===== */
const navToggle  = document.getElementById('navToggle');
const navLinks   = document.getElementById('navLinks');
const navClose   = document.getElementById('navClose');

function openNav(){
  navLinks.classList.add('open');
  if (navBackdrop) navBackdrop.classList.add('visible');
  navToggle.setAttribute('aria-expanded','true');
  document.body.style.overflow = 'hidden';
}

function closeNav(){
  navLinks.classList.remove('open');
  if (navBackdrop) navBackdrop.classList.remove('visible');
  navToggle.setAttribute('aria-expanded','false');
  document.body.style.overflow = '';
}

navToggle.addEventListener('click', openNav);
navClose.addEventListener('click', closeNav);
document.addEventListener('keydown', e => { if(e.key==='Escape') closeNav(); });

/* ===== FAQ accordion ===== */
document.querySelectorAll('.faq-item').forEach(item => {
  item.querySelector('.faq-q').addEventListener('click', () => {
    const wasOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
    if(!wasOpen) item.classList.add('open');
  });
});

/* ===== Scroll reveal ===== */
const revealEls = document.querySelectorAll('.reveal');
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.08 });
revealEls.forEach(el => io.observe(el));


function setMockLang(lang) {
  const t = MOCK_TEXT[lang];
  const fields = Object.values(mockEls);
  fields.forEach(f => f.style.opacity = 0);
  setTimeout(() => {
    mockEls.name.textContent  = t.name;
    mockEls.title.textContent = t.title;
    mockEls.sec1.textContent  = t.sec1;
    mockEls.sec2.textContent  = t.sec2;
    mockEls.role.textContent  = t.role;
    mockEls.co.textContent    = t.co;
    mockEls.tag1.textContent  = t.tags[0];
    mockEls.tag2.textContent  = t.tags[1];
    mockEls.tag3.textContent  = t.tags[2];
    fields.forEach(f => f.style.opacity = 1);
  }, 180);
}

document.querySelectorAll('.lang-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setMockLang(btn.dataset.lang);
  });
});


/* ===== Cookie banner ===== */
const cookieBanner = document.getElementById('cookieBanner');
const cookieKey = 'latwecv_cookie_consent';

function hideCookie(){
  cookieBanner.classList.remove('visible');
  setTimeout(() => cookieBanner.style.display='none', 400);
}

if(!localStorage.getItem(cookieKey)){
  setTimeout(() => cookieBanner.classList.add('visible'), 1200);
}

document.getElementById('cookieAccept').addEventListener('click', () => {
  localStorage.setItem(cookieKey, 'accepted');
  hideCookie();
});
document.getElementById('cookieReject').addEventListener('click', () => {
  localStorage.setItem(cookieKey, 'rejected');
  hideCookie();
});
</script>
